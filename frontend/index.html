<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Profil Chatbot | Yeni Nesil İK Platformu</title>
    <meta name="description" content="RAG destekli LinkedIn benzeri profesyonel yetenek ağı. Adayların CV'lerini yüklediği ve anında quiz oluşturulduğu platform.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="logo-icon">🤖</span>
                <span class="logo-text">AI Profil Bot</span>
            </div>
            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <span class="nav-icon">📊</span>
                    Dashboard
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">👥</span>
                    Adaylar
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">📤</span>
                    CV Yükle
                </a>
                <a href="#" class="nav-item">
                    <span class="nav-icon">⚙️</span>
                    Ayarlar
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <div class="search-bar">
                    <span class="search-icon">🔍</span>
                    <input type="text" placeholder="Python, React Native, 3+ yıl deneyim..." id="searchInput">
                </div>
                <div class="header-actions">
                    <button class="btn btn-outline" id="loadSampleBtn">Örnek Veri Yükle</button>
                    <button class="btn btn-primary" id="uploadBtn">+ CV Ekle</button>
                </div>
            </header>

            <div class="content">
                <div class="hero-section">
                    <h1>Y yetenekleri <span>Yapay Zeka</span> ile keşfedin</h1>
                    <p>CV'leri analiz edin, teknik quizler oluşturun ve adaylarla RAG destekli AI mülakatlar gerçekleştirin.</p>
                </div>

                <div class="candidates-grid" id="candidatesGrid">
                    <!-- Aday Kartları JS ile buraya eklenecek -->
                    <div class="candidate-card skeleton"></div>
                    <div class="candidate-card skeleton"></div>
                    <div class="candidate-card skeleton"></div>
                </div>
            </div>
        </main>
    </div>

    <!-- Script -->
    <script src="js/app.js"></script>
</body>
</html>
